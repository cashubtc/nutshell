name: shadow_tests

on:
  push:
    branches: [ security/harden-test-assertions ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Código
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Forzamos 3.11 por estabilidad de grpcio/secp256k1
          cache: 'pip'

      - name: 📦 Instalar Dependencias de Sistema (Hardened)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3-dev \
            libsecp256k1-dev \
            pkg-config \
            libffi-dev \
            libssl-dev \
            g++ \
            cmake

      - name: 📦 Instalar Python Deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Instalamos primero lo más difícil de compilar por separado
          pip install grpcio==1.69.0 coincurve==20.0.0
          # Ahora el resto
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pip install -e .

      - name: 🧪 Ejecutar Tests
        run: |
          python -m pytest -v

