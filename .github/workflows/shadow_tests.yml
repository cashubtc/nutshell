name: shadow_tests

on:
  push:
    branches: [ main, dev, security/harden-test-assertions ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Simplificamos a las más estables para asegurar el éxito inicial
        python-version: ["3.11", "3.12"]

    steps:
      - name: 📂 Checkout Código
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Instalar Dependencias de Sistema (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsecp256k1-dev pkg-config

      - name: 📦 Instalar Python Deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          # Instalamos dependencias del repo si existen
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Instalamos el paquete en modo editable
          pip install -e .

      - name: 🧪 Ejecutar Tests
        run: |
          python -m pytest -v

