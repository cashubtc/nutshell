name: shadow_tests

on:
  push:
    branches: [ main, dev, security/harden-test-assertions ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Usamos 3.12 y 3.13 que es lo que tienes en Termux
        python-version: ["3.12", "3.13"]

    steps:
      - name: 📂 Checkout Código
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Instalar Dependencias de Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3-dev \
            libsecp256k1-dev \
            pkg-config \
            libffi-dev \
            libssl-dev

      - name: 📦 Instalar Dependencias de Python
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Instalamos los requisitos del archivo que me pasaste
          pip install -r requirements.txt
          # Instalamos herramientas de test
          pip install pytest pytest-asyncio
          # Instalamos nutshell en modo editable
          pip install -e .

      - name: 🧪 Ejecutar Suite de Tests (ShadowRoot Mode)
        run: |
          python -m pytest -v

