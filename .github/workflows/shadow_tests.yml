name: shadow_tests

on:
  push:
    branches: [ main, dev, security/harden-test-assertions ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Probamos en las versiones más relevantes para Cashu
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    
    steps:
      - name: 📂 Checkout Código
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Instalar Dependencias y Proyecto
        run: |
          python -m pip install --upgrade pip
          # Instalamos dependencias base de Cashu
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Instalamos herramientas de test
          pip install pytest pytest-asyncio
          # CRITICO: Instalamos el paquete actual para que los imports funcionen
          pip install -e .

      - name: 🧪 Ejecutar Suite de Tests
        run: |
          # Usamos python -m pytest para asegurar que el path sea el correcto
          python -m pytest -v

