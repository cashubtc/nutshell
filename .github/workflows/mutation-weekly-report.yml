name: mutation weekly report

on:
  schedule:
    # All five profiles have finished by Friday at 01:00 UTC.
    - cron: "0 3 * * 6"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  report:
    name: Publish weekly mutation report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create weekly mutation report
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: scripts/mutation_weekly_report.sh
